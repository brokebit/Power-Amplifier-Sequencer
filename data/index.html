<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA Sequencer</title>
<style>
body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; }
h1 { border-bottom: 1px solid #ccc; padding-bottom: 8px; }
pre { background: #f4f4f4; padding: 12px; overflow-x: auto; }
#state { white-space: pre-wrap; }
.connected { color: green; }
.disconnected { color: red; }
</style>
</head>
<body>
<h1>PA Sequencer - Test</h1>
<p>API: <a href="/api/state">/api/state</a> |
   <a href="/api/version">/api/version</a> |
   <a href="/api/config">/api/config</a></p>
<h2>Live State <span id="ws-status" class="disconnected">(connecting...)</span></h2>
<pre id="state">Waiting for data...</pre>
<script>
function connect() {
    var ws = new WebSocket('ws://' + location.host + '/ws');
    var el = document.getElementById('state');
    var status = document.getElementById('ws-status');
    ws.onopen = function() { status.textContent = '(connected)'; status.className = 'connected'; };
    ws.onclose = function() { status.textContent = '(disconnected)'; status.className = 'disconnected'; setTimeout(connect, 2000); };
    ws.onmessage = function(e) { el.textContent = JSON.stringify(JSON.parse(e.data), null, 2); };
}
connect();
</script>
</body>
</html>
